[fujinet]
build_platform = BUILD_IEC
build_bus      = IEC
build_board    = fujiloaf-rev0

[env:fujiloaf-rev0]
platform = espressif32@${fujinet.esp32_platform_version}
platform_packages = ${fujinet.esp32_platform_packages}
board = fujinet-v1
build_type = debug
build_flags =
    ${env.build_flags}
    -D PINMAP_FUJILOAF_REV0
